name: CI

on:
  push:
  pull_request:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install svd2rust --version 0.37.1 --locked
      - run: ./scripts/check.sh
